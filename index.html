    <!DOCTYPE html>
        <html lang="pt-BR">
                <head>
                    <meta charset="UTF-8">
                        <meta name="viewport" content="width=device-width, initial-scale=1.0">
                            <link rel="stylesheet" href="./assets/css/style.css">
                    <title>Node-JS.API (Front-End)</title>
                </head>
            <body>
                <div class="btnForm">
                    <button id="btnOpenModal">Abrir modal de cadastro</button>
                </div>
                <div id="resultado" class="resultado"></div> 
                <div class="modalFormCadastro hide-modal" id="modalFormCadastro">
                    <form action="">
                        <div class="inputGroup">
                            <input type="text" id="nome" placeholder="Nome">
                            <br>
                            <input type="text" id="email" placeholder="Email">
                            <br>
                            <input type="text" id="telefone" placeholder="Telefone">
                            <br>
                            <input type="text" id="cidade" placeholder="Cidade">
                            <br>
                            <input type="text" id="estado" placeholder="Estado">
                            <br>
                        </div>
                        <div class="btnGroup" id="btnGroup">
                            <button class="btn btnSave" id="btnSave">Cadastro</button>
                            <button class="btn btnAtualizar hide" id="btnAtualizar">Atualizar</button>
                            <button class="btn btnCancelar" id="btnCancelar">Cancelar</button>
                        </div>
                        <br>
                        <div id="message" class="message"></div>
                    </form>
                </div>   
                <script src="./assets/js/app.js"></script>
            </body>
        </html>
